[build]
  base      = "mobile"
  publish   = "dist"
  command   = "npm install && npm run build"

[build.environment]
  NODE_VERSION     = "22"
  VITE_BACKEND_URL = "https://ibrahim-backend-production.up.railway.app"
  VITE_WS_URL      = "wss://ibrahim-backend-production.up.railway.app"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
