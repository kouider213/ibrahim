  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

gba(255,255,255,0.3), transparent);\n    background-size: 100% 100%;\n    opacity: 0.5;\n  }\n\n  .shell {\n    position: relative;\n    height: 100vh;\n    width: 100vw;\n    display: grid;\n    grid-template-rows: auto 1fr auto;\n    padding: 40px 48px;\n  }\n\n  /* ------------- HEADER ------------- */\n  header {\n    display: flex;\n    justify-content: space-between;\n    align-items: flex-start;\n    z-index: 5;\n  }\n\n  .brand {\n    display: flex;\n    flex-direction: column;\n    gap: 6px;\n  }\n\n  .brand .tag {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    letter-spacing: 0.3em;\n    color: var(--muted);\n    text-transform: uppercase;\n  }\n\n  .brand h1 {\n    font-family: 'Orbitron', sans-serif;\n    font-weight: 700;\n    font-size: 56px;\n    letter-spacing: 0.18em;\n    line-height: 1;\n    color: var(--fg);\n    text-shadow: 0 0 20px rgba(255,255,255,0.12);\n  }\n\n  .status-pill {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    padding: 10px 16px;\n    border: 1px solid rgba(255,255,255,0.08);\n    border-radius: 999px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    letter-spacing: 0.2em;\n    color: var(--muted);\n    text-transform: uppercase;\n    background: rgba(255,255,255,0.02);\n    backdrop-filter: blur(8px);\n  }\n\n  .status-dot {\n    width: 8px; height: 8px;\n    border-radius: 50%;\n    background: var(--idle);\n    box-shadow: 0 0 10px var(--idle-glow);\n    transition: all 0.5s ease;\n  }\n\n  body[data-state=\"listen\"] .status-dot {\n    background: var(--listen-bright);\n    box-shadow: 0 0 14px var(--listen-glow);\n  }\n  body[data-state=\"speak\"] .status-dot {\n    background: var(--speak-bright);\n    box-shadow: 0 0 14px var(--speak-glow);\n  }\n\n  /* ------------- STAGE ------------- */\n  .stage {\n    position: relative;\n    display: grid;\n    place-items: center;\n    overflow: visible;\n  }\n\n  /* concentric guide rings */\n  .guides {\n a {\n    background: radial-gradient(circle, var(--speak-glow) 0%, transparent 55%);\n    animation: aura-pulse 1.1s ease-in-out infinite;\n  }\n  @keyframes aura-pulse {\n    0%, 100% { opacity: 0.55; transform: scale(1); }\n    50%      { opacity: 0.95; transform: scale(1.06); }\n  }\n\n  /* sonar rings (listen) */\n  .sonar {\n    position: absolute;\n    width: 420px; height: 420px;\n    pointer-events: none;\n    display: none;\n  }\n  body[data-state=\"listen\"] .sonar { display: block; }\n  .sonar span {\n    position: absolute;\n    inset: 0;\n    border-radius: 50%;\n    border: 2px solid var(--listen-bright);\n    opacity: 0;\n    animation: sonar 2.8s ease-out infinite;\n  }\n  .sonar span:nth-child(2) { animation-delay: 0.9s; }\n  .sonar span:nth-child(3) { animation-delay: 1.8s; }\n  @keyframes sonar {\n    0%   { transform: scale(1);   opacity: 0.7; border-width: 2px; }\n    100% { transform: scale(1.9); opacity: 0;   border-width: 1px; }\n  }\n\n  /* radial speaker rays (speak) */\n  .rays {\n    position: absolute;\n    width: 560px; height: 560px;\n    display: none;\n    pointer-events: none;\n  }\n  body[data-state=\"speak\"] .rays { display: block; }\n  .rays .ray {\n    position: absolute;\n    top: 50%; left: 50%;\n    width: 2px;\n    height: 40px;\n    margin-left: -1px;\n    background: linear-gradient(to top, transparent, var(--speak-bright));\n    transform-origin: 50% 140px; /* pushes out from globe edge */\n    transform: translate(-50%, -50%) rotate(var(--a)) translateY(-140px);\n    border-radius: 2px;\n    opacity: 0.9;\n    animation: ray-osc 0.7s ease-in-out infinite;\n    animation-delay: var(--d);\n  }\n  @keyframes ray-osc {\n    0%, 100% { height: 16px; opacity: 0.3; }\n    50%      { height: 60px; opacity: 1; }\n  }\n\n  /* the globe itself: canvas does the rendering */\n  .globe {\n    position: relative;\n    width: 340px;\n    height: 340px;\n    border-radius: 50%;\n    transition: box-shadow 0.6s ease;\n    box-shadow:\n      0 0 50px var(--idle-glow),\n      0 0 120px var(--idle-glow);\n    overflow: visible;\n  }\n  body[data-state=\"listen\"] .globe {\n    box-shadow: 0 0 60px var(--listen-glow), 0 0 160px var(--listen-glow);\n  }\n  body[data-state=\"speak\"] .globe {\n    box-shadow: 0 0 70px var(--speak-glow), 0 0 180px var(--speak-glow);\n  }\n\n  /* true 3D sphere rendered via canvas (ray-traced per-pixel with world texture) */\n  .sphere3d {\n    position: absolute;\n    inset: 0;\n    border-radius: 50%;\n    display: block;\n    width: 100%;\n    height: 100%;\n  }\n\n  /* marker anchored onto sphere in screen space — JS updates left/top */\n  .marker {\n    position: absolute;\n    width: 14px; height: 14px;\n    margin-left: -7px; margin-top: -7px;\n    pointer-events: none;\n    z-index: 3;\n    transition: opacity 0.3s ease;\n  }\n  .marker .pin {\n    position: absolute;\n    inset: 3px;\n    border-radius: 50%;\n    background: #fff;\n    box-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 24px rgba(255,255,255,0.6);\n  }\n  .marker .pulse {\n    position: absolute;\n    inset: 0;\n    border-radius: 50%;\n    border: 1.5px solid #fff;\n    animation: markerPulse 1.8s ease-out infinite;\n  }\n  .marker .pulse.p2 { animation-delay: 0.6s; }\n  .marker .pulse.p3 { animation-delay: 1.2s; }\n  @keyframes markerPulse {\n    0%   { transform: scale(1);   opacity: 0.9; }\n    100% { transform: scale(3.6); opacity: 0;   }\n  }\n  .marker .label {\n    position: absolute;\n    left: 16px; top: -4px;\n    white-space: nowrap;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9px;\n    letter-spacing: 0.25em;\n    color: rgba(255,255,255,0.85);\n    text-transform: uppercase;\n    text-shadow: 0 0 6px rgba(0,0,0,0.8);\n  }\n  body[data-state=\"listen\"] .marker .pin { background: #14a85a; box-shadow: 0 0 10px rgba(20,168,90,0.9), 0 0 28px rgba(20,168,90,0.6); }\n  body[data-state=\"listen\"] .marker .pulse { border-color: #14a85a; }\n  body[data-state=\"speak\"]  .marker .pin { background: #ff3355; box-shadow: 0 0 10px rgba(255,51,85,0.9), 0 0 28px rgba(255,51,85,0.6); }\n  body[data-state=\"speak\"]  .marker .pulse { border-color: #ff3355; }\n\n  /* big central \"I\" */\n  .letter-I {\n    position: absolute;\n    inset: 0;\n    display: grid;\n    place-items: center;\n    pointer-events: none;\n    font-family: 'Orbitron', sans-serif;\n    font-weight: 800;\n    font-size: 180px;\n    line-height: 1;\n    color: #ffffff;\n    letter-spacing: -0.05em;\n    opacity: 0.92;\n    text-shadow:\n      0 0 16px rgba(255,255,255,0.85),\n      0 0 40px rgba(255,255,255,0.55),\n      0 0 90px rgba(255,255,255,0.35);\n    mix-blend-mode: screen;\n    transition: text-shadow 0.6s ease;\n  }\n  body[data-state=\"listen\"] .letter-I {\n    text-shadow:\n      0 0 18px rgba(220,255,230,0.9),\n      0 0 50px rgba(120,255,170,0.6),\n      0 0 110px rgba(20,168,90,0.45);\n  }\n  body[data-state=\"speak\"] .letter-I {\n    text-shadow:\n      0 0 18px rgba(255,225,230,0.9),\n      0 0 50px rgba(255,90,120,0.6),\n      0 0 110px rgba(210,16,52,0.5);\n    animation: letter-kick 0.22s ease-in-out infinite alternate;\n  }\n  @keyframes letter-kick {\n    from { transform: scale(1); }\n    to   { transform: scale(1.015); }\n  }\n\n\n  /* ------------- FOOTER ------------- */\n  footer {\n    display: grid;\n    grid-template-columns: 1fr auto 1fr;\n    align-items: end;\n    gap: 40px;\n    z-index: 5;\n  }\n\n  .readout {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    letter-spacing: 0.15em;\n    color: var(--muted);\n    text-transform: uppercase;\n    line-height: 1.8;\n  }\n  .readout .k { color: rgba(255,255,255,0.35); }\n  .readout .v { color: var(--fg); }\n  body[data-state=\"listen\"] .readout .v.state-v { color: var(--listen-bright); }\n  body[data-state=\"speak\"]  .readout .v.state-v { color: var(--speak-bright); }\n\n  .controls {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: d: rgba(20, 168, 90, 0.12);\n    box-shadow: 0 0 20px rgba(20, 168, 90, 0.25);\n  }\n\n  .btn.danger {\n    border-color: rgba(255, 51, 85, 0.6);\n    color: var(--speak-bright);\n  }\n  .btn.danger:hover {\n    background: rgba(255, 51, 85, 0.1);\n    box-shadow: 0 0 20px rgba(255, 51, 85, 0.2);\n  }\n\n  .btn .ico {\n    display: inline-block;\n    width: 10px; height: 10px;\n    border-radius: 50%;\n    background: currentColor;\n    box-shadow: 0 0 10px currentColor;\n  }\n  .btn.danger .ico {\n    border-radius: 2px;\n  }\n\n  /* live waveform (speak state) */\n  .waveform {\n    display: flex;\n    align-items: center;\n    gap: 3px;\n    height: 48px;\n    opacity: 0;\n    transition: opacity 0.4s ease;\n  }\n  body[data-state=\"speak\"] .waveform { opacity: 1; }\n\n  .waveform i {\n    display: block;\n    width: 3px;\n    background: var(--speak-bright);\n    border-radius: 2px;\n    height: 6px;\n    animation: wave 0.9s ease-in-out infinite;\n    box-shadow: 0 0 6px var(--speak-glow);\n  }\n\n  @keyframes wave {\n    0%, 100% { height: 6px; }\n    50%      { height: 42px; }\n  }\n\n  .meta-right {\n    text-align: right;\n  }\n\n  /* scanline on globe during speak */\n  .scanline {\n    position: absolute;\n    left: 0; right: 0;\n    height: 2px;\n    background: linear-gradient(to right, transparent, rgba(255,255,255,0.5), transparent);\n    display: none;\n    pointer-events: none;\n    mix-blend-mode: screen;\n  }\n  body[data-state=\"speak\"] .scanline {\n    display: block;\n    animation: scan 2.2s linear infinite;\n  }\n  @keyframes scan {\n    0%   { top: 10%; opacity: 0; }\n    10%  { opacity: 1; }\n    90%  { opacity: 1; }\n    100% { top: 90%; opacity: 0; }\n  }\n\n  /* small responsive adjust */\n  @media (max-height: 780px) {\n    .globe-wrap { width: 340px; height: 340px; }\n    .globe { width: 280px; height: 280px; }\n    .sonar { width: 340px; height: 340px; }\n    .letter-I { font-size: 180px; }\n    .brand h1 { font-size: 42px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body data-state=\"idle\">\n\n\n<div class=\"stars\"><\u002Fdiv>\n\n<div class=\"shell\">\n\n  <header>\n    <div class=\"brand\">\n      <span class=\"tag\">Voice Interface · v1.0<\u002Fspan>\n      <h1>IBRAHIM<\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"status-pill\">\n      <span class=\"status-dot\"><\u002Fspan>\n      <span id=\"statusLabel\">System · Idle<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section class=\"stage\">\n    <div class=\"ticks\">\n      <div class=\"tick tl\"><\u002Fdiv>\n      <div class=\"tick tr\"><\u002Fdiv>\n      <div class=\"tick bl\"><\u002Fdiv>\n      <div class=\"tick br\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"guides\">\n      <div class=\"guide-ring\"><\u002Fdiv>\n      <div class=\"guide-ring\"><\u002Fdiv>\n      <div class=\"guide-ring\"><\u002Fdiv>\n      <div class=\"guide-ring\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"globe-wrap\">\n      <div class=\"aura\"><\u002Fdiv>\n\n      <!-- listen sonar pulses -->\n      <div class=\"sonar\">\n        <span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- speak radial rays -->\n      <div class=\"rays\" id=\"rays\"><\u002Fdiv>\n\n      <div class=\"globe\" id=\"globe\">\n        <canvas class=\"sphere3d\" id=\"sphere\" width=\"680\" height=\"680\"><\u002Fcanvas>\n        <div class=\"marker\" id=\"marker\">\n          <span class=\"pulse\"><\u002Fspan>\n          <span class=\"pulse p2\"><\u002Fspan>\n          <span class=\"pulse p3\"><\u002Fspan>\n          <span class=\"pin\"><\u002Fspan>\n          <span class=\"label\">ORAN · DZ<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"scanline\"><\u002Fdiv>\n        <div class=\"letter-I\">I<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer>\n    <div class=\"readout\">\n      <div><span class=\"k\">STATE ·<\u002Fspan> <span class=\"v state-v\" id=\"roState\">IDLE<\u002Fspan><\u002Fdiv>\n      <div><span class=\"k\">FREQ  ·<\u002Fspan> <span class=\"v\" id=\"roFreq\">0.00 Hz<\u002Fspan><\u002Fdiv>\n      <div><span class=\"k\">NODE  ·<\u002Fspan> <span class=\"v\">IBR-01 · DZ<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"controls\">\n      <div class=\"caption\" id=\"caption\">\n        <span id=\"captionText\">Prêt à écouter<\u002Fspan>\n        <span class=\"dot-trio\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"waveform\" id=\"waveform\"><\u002Fdiv>\n\n      <div class=\"buttons\">\n        <button class=\"btn primary\" id=\"btnTalk\">\n          <span class=\"ico\"><\u002Fspan>\n          <span>Parler<\u002Fspan>\n        <\u002Fbutton>\n        <button class=\"btn\" id=\"btnReply\">\n          <span>Répondre<\u002Fspan>\n        <\u002Fbutton>\n        <button class=\"btn danger\" id=\"btnStop\">\n          <span class=\"ico\"><\u002Fspan>\n          <span>Stop<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"readout meta-right\">\n      <div><span class=\"k\">· LAT<\u002Fspan> <span class=\"v\">35.6971° N<\u002Fspan><\u002Fdiv>\n      <div><span class=\"k\">· LON<\u002Fspan> <span class=\"v\">0.6308° W<\u002Fspan><\u002Fdiv>\n      <div><span class=\"k\">· UTC<\u002Fspan> <span class=\"v\" id=\"roTime\">--:--:--<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n\n<script>\n  // ---------- world texture, built from real GeoJSON country borders ----------\n  // lon -180..180 → x 0..TEX_W, lat 90..-90 → y 0..TEX_H.\n  const TEX_W = 2048, TEX_H = 1024;\n  const texCanvas = document.createElement('canvas');\n  texCanvas.width = TEX_W; texCanvas.height = TEX_H;\n  const texCtx = texCanvas.getContext('2d');\n\n  let countriesData = null; // GeoJSON FeatureCollection\n  let texImageData = null;\n\n  function ll2xy(lon, lat) {\n    return [(lon + 180) / 360 * TEX_W, (90 - lat) / 180 * TEX_H];\n  }\n  function traceRing(ring) {\n    if (!ring || !ring.length) return;\n    let [px, py] = ll2xy(ring[0][0], ring[0][1]);\n    texCtx.moveTo(px, py);\n    for (let i = 1; i < ring.length; i++) {\n      const [nx, ny] = ll2xy(ring[i][0], ring[i][1]);\n      // antimeridian safe-guard\n      if (Math.abs(nx - px) > TEX_W * 0.5) texCtx.moveTo(nx, ny);\n      else texCtx.lineTo(nx, ny);\n      px = nx; py = ny;\n    }\n    texCtx.closePath();\n  }\n  function drawGeometry(geom) {\n    if (!geom) return;\n    if (geom.type === 'Polygon') {\n      texCtx.beginPath();\n      for (const ring of geom.coordinates) traceRing(ring);\n      texCtx.fill('evenodd');\n      texCtx.stroke();\n    } else if (geom.type === 'MultiPolygon') {\n      for (const poly of geom.coordinates) {\n        texCtx.beginPath();\n        for (const ring of poly) traceRing(ring);\n        texCtx.fill('evenodd');\n        texCtx.stroke();\n      }\n    }\n  }\n\n  // placeholder removed\n  const _UNUSED_SVG = `\n<svg viewBox=\"0 0 1000 500\" preserveAspectRatio=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n  <g>\n    <!-- NORTH AMERICA: Alaska + Canada + USA + Mexico + Central America -->\n    <path class=\"land\" d=\"M60,120 L95,105 L140,100 L175,95 L205,100 L235,115 L260,110 L275,120 L270,140 L250,150 L235,145 L215,155 L200,170 L215,175 L235,170 L250,180 L235,195 L215,205 L200,220 L195,240 L205,255 L220,270 L230,285 L225,300 L210,310 L195,305 L180,290 L170,275 L165,260 L160,245 L150,235 L135,225 L120,210 L110,195 L100,180 L95,165 L90,150 L85,135 L75,130 Z\" />\n    <!-- Greenland -->\n    <path class=\"land\" d=\"M290,70 L320,60 L345,65 L355,85 L350,110 L335,125 L315,130 L298,120 L290,100 L285,85 Z\" />\n    <!-- Central America tail -->\n    <path class=\"land\" d=\"M225,300 L240,305 L255,320 L265,335 L275,345 L280,355 L270,360 L260,350 L248,335 L235,320 L225,310 Z\" />\n    <!-- Caribbean (simple blobs) -->\n    <path class=\"land\" d=\"M270,320 L285,318 L295,325 L285,332 L272,328 Z\" />\n    <path class=\"land\" d=\"M300,325 L315,322 L325,328 L318,335 L305,333 Z\" />\n\n    <!-- SOUTH AMERICA -->\n    <path class=\"land\" d=\"M290,360 L310,355 L330,360 L345,375 L355,395 L360,420 L355,445 L345,465 L330,480 L315,485 L305,475 L300,455 L295,435 L290,415 L285,395 L285,378 Z\" />\n\n    <!-- EUROPE -->\n    <path class=\"land\" d=\"M460,130 L485,118 L510,115 L535,120 L560,125 L585,130 L610,135 L605,150 L585,155 L565,160 L545,165 L525,170 L510,175 L495,175 L480,170 L470,160 L460,150 Z\" />\n    <!-- British Isles -->\n    <path class=\"land\" d=\"M455,135 L470,130 L475,145 L470,160 L460,160 L453,150 Z\" />\n    <!-- Scandinavia -->\n    <path class=\"land\" d=\"M515,80 L540,75 L555,85 L560,105 L555,125 L545,135 L530,130 L520,115 L515,100 Z\" />\n    <!-- Iceland -->\n    <path class=\"land\" d=\"M420,100 L440,95 L448,108 L438,118 L422,115 Z\" />\n\n    <!-- AFRICA -->\n    <path class=\"land\" d=\"M490,200 L520,195 L555,198 L590,200 L615,205 L625,215 L630,235 L635,260 L625,285 L615,310 L600,335 L585,355 L570,375 L555,385 L540,380 L525,365 L515,345 L505,325 L500,305 L495,285 L490,265 L488,245 L488,225 L488,210 Z\" />\n    <!-- Madagascar -->\n    <path class=\"land\" d=\"M645,330 L655,325 L660,340 L655,360 L648,365 L642,350 Z\" />\n\n    <!-- MIDDLE EAST -->\n    <path class=\"land\" d=\"M610,195 L640,192 L670,198 L685,210 L680,225 L665,235 L645,232 L625,225 L615,215 Z\" />\n\n    <!-- ASIA: massive mass from Turkey to Kamchatka/Japan -->\n    <path class=\"land\" d=\"M610,135 L650,128 L700,125 L750,120 L800,115 L845,115 L885,120 L915,130 L935,145 L945,165 L935,180 L915,185 L890,185 L870,180 L850,185 L830,195 L810,205 L790,210 L770,205 L750,200 L730,195 L710,195 L690,200 L670,198 L650,190 L635,180 L625,165 L615,150 Z\" />\n    <!-- India -->\n    <path class=\"land\" d=\"M745,210 L770,208 L790,215 L800,235 L790,258 L775,268 L760,260 L750,240 L745,225 Z\" />\n    <!-- Southeast Asia peninsula -->\n    <path class=\"land\" d=\"M820,215 L840,212 L855,225 L858,245 L848,260 L835,262 L825,250 L820,235 Z\" />\n    <!-- Japan -->\n    <path class=\"land\" d=\"M910,175 L925,168 L935,180 L928,195 L918,200 L908,188 Z\" />\n    <!-- Kamchatka / NE Asia -->\n    <path class=\"land\" d=\"M930,115 L950,110 L960,125 L955,145 L945,160 L935,150 L928,135 Z\" />\n\n    <!-- INDONESIA / MARITIME SE ASIA -->\n    <path class=\"land\" d=\"M830,275 L858,272 L880,278 L895,285 L885,292 L860,290 L840,288 L828,283 Z\" />\n    <path class=\"land\" d=\"M810,285 L825,283 L820,295 L808,295 Z\" />\n    <path class=\"land\" d=\"M870,295 L890,292 L905,300 L895,308 L878,305 Z\" />\n    <!-- Philippines -->\n    <path class=\"land\" d=\"M890,250 L902,245 L905,258 L898,268 L890,263 Z\" />\n\n    <!-- AUSTRALIA -->\n    <path class=\"land\" d=\"M855,335 L890,330 L920,335 L940,345 L945,360 L935,375 L915,380 L890,378 L865,370 L852,358 L850,345 Z\" />\n    <!-- New Zealand -->\n    <path class=\"land\" d=\"M950,395 L962,390 L968,405 L960,418 L952,410 Z\" />\n    <path class=\"land\" d=\"M965,420 L975,415 L980,428 L970,435 Z\" />\n    <!-- New Guinea -->\n    <path class=\"land\" d=\"M895,305 L920,302 L940,308 L945,318 L930,322 L910,320 L895,315 Z\" />\n\n    <!-- ANTARCTICA band -->\n    <path class=\"land\" d=\"M40,465 L120,458 L220,455 L330,452 L440,450 L560,452 L680,455 L800,458 L920,462 L975,468 L975,495 L40,495 Z\" />\n  <\u002Fg>\n<\u002Fsvg>`;\n\n  // ---------- color themes per state ----------\n  const THEMES = {\n    idle:   { ocean: [18, 28, 40],    land: [170, 185, 200], border: [255,255,255,0.35], grid: [120, 145, 170, 0.2] },\n    listen: { ocean: [5, 40, 25],     land: [70, 210, 130],  border: [220,255,235,0.55], grid: [120, 255, 170, 0.25] },\n    speak:  { ocean: [50, 8, 18],     land: [255, 120, 140], border: [255,220,225,0.6],  grid: [255, 160, 170, 0.28] },\n  };\n\n  let currentTheme = 'idle';\n\n  function drawTexture(theme) {\n    const t = THEMES[theme];\n    texCtx.fillStyle = `rgb(${t.ocean[0]},${t.ocean[1]},${t.ocean[2]})`;\n    texCtx.fillRect(0, 0, TEX_W, TEX_H);\n    // grid lines (faint)\n    texCtx.strokeStyle = `rgba(${t.grid[0]},${t.grid[1]},${t.grid[2]},${t.grid[3]})`;\n    texCtx.lineWidth = 1;\n    for (let lat = -60; lat <= 60; lat += 30) {\n      const y = (90 - lat) / 180 * TEX_H;\n      texCtx.beginPath(); texCtx.moveTo(0, y); texCtx.lineTo(TEX_W, y); texCtx.stroke();\n    }\n    for (let lon = -150; lon <= 150; lon += 30) {\n      const x = (lon + 180) / 360 * TEX_W;\n      texCtx.beginPath(); texCtx.moveTo(x, 0); texCtx.lineTo(x, TEX_H); texCtx.stroke();\n    }\n    // draw countries if loaded\n    if (countriesData) {\n      texCtx.fillStyle = `rgb(${t.land[0]},${t.land[1]},${t.land[2]})`;\n      texCtx.strokeStyle = `rgba(${t.border[0]},${t.border[1]},${t.border[2]},${t.border[3]})`;\n      texCtx.lineWidth = 1.2;\n      texCtx.lineJoin = 'round';\n      for (const f of countriesData.features) drawGeometry(f.geometry);\n    }\n    texImageData = texCtx.getImageData(0, 0, TEX_W, TEX_H);\n  }\n\n  // fetch real country borders (Natural Earth 110m via well-known CDN)\n  (async function loadCountries() {\n    try {\n      const url = (window.__resources && window.__resources.countriesTopo) || 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json';\n      const r = await fetch(url);\n      if (r.ok) {\n        const topo = await r.json();\n        countriesData = topoToGeo(topo, topo.objects.countries);\n        drawTexture(currentTheme);\n      }\n    } catch(e) { console.warn('country borders failed to load', e); }\n  })();\n\n  // Minimal TopoJSON → GeoJSON converter for Feature/MultiPolygon only\n  function topoToGeo(topo, obj) {\n    const arcs = topo.arcs;\n    const transform = topo.transform;\n    const sx = transform.scale[0], sy = transform.scale[1];\n    const tx = transform.translate[0], ty = transform.translate[1];\n    function decodeArc(i) {\n      const rev = i < 0;\n      const arc = arcs[rev ? ~i : i];\n      let x = 0, y = 0;\n      const pts = [];\n      for (const p of arc) {\n        x += p[0]; y += p[1];\n        pts.push([x * sx + tx, y * sy + ty]);\n      }\n      return rev ? pts.slice().reverse() : pts;\n    }\n    function ringFromArcs(arcIds) {\n      const out = [];\n      for (let k = 0; k < arcIds.length; k++) {\n        const pts = decodeArc(arcIds[k]);\n        if (k > 0) pts.shift(); // avoid duplicate join point\n        for (const p of pts) out.push(p);\n      }\n      return out;\n    }\n    function geomToGeo(g) {\n      if (g.type === 'Polygon') {\n        return { type: 'Polygon', coordinates: g.arcs.map(ringFromArcs) };\n      } else if (g.type === 'MultiPolygon') {\n        return { type: 'MultiPolygon', coordinates: g.arcs.map(poly => poly.map(ringFromArcs)) };\n      }\n      return null;\n    }\n    return {\n      type: 'FeatureCollection',\n      features: obj.geometries.map(g => ({ type: 'Feature', properties: g.properties || {}, geometry: geomToGeo(g) }))\n    };\n  }\n\n  drawTexture('idle');\n\n  // ---------- 3D sphere renderer ----------\n  const canvas = document.getElementById('sphere');\n  const ctx = canvas.getContext('2d');\n  const CW = canvas.width, CH = canvas.height;\n  const cx = CW / 2, cy = CH / 2;\n  const radius = Math.min(CW, CH) * 0.48;\n  const R2 = radius * radius;\n\n  // tilt the globe (axial tilt) for nicer look\n  const TILT = 23.5 * Math.PI / 180;\n  const sinT = Math.sin(TILT), cosT = Math.cos(TILT);\n\n  let lonOffset = 0; // rotation around Y axis\n  let lastT = performance.now();\n\n  // precompute which pixels are inside the circle (for speed)\n  const outBuf = ctx.createImageData(CW, CH);\n  const outData = outBuf.data;\n\n  function renderSphere() {\n    if (!texImageData) return;\n    const td = texImageData.data;\n    // lighting direction (from upper-left toward sphere)\n    const lx = -0.55, ly = -0.45, lz = 0.70;\n    for (let py = 0; py < CH; py++) {\n      for (let px = 0; px < CW; px++) {\n        const dx = px - cx, dy = py - cy;\n        const d2 = dx*dx + dy*dy;\n        const idx = (py * CW + px) * 4;\n        if (d2 > R2) {\n          outData[idx+3] = 0;\n          continue;\n        }\n        // point on sphere surface (screen x,y; derive z from circle)\n        const z = Math.sqrt(R2 - d2);\n        // normalize to unit sphere normal\n        const nx = dx / radius;\n        const ny = dy / radius;\n        const nz = z  / radius;\n        // undo axial tilt (rotate around X axis by -TILT)\n        const ny2 =  ny * cosT + nz * sinT;\n        const nz2 = -ny * sinT + nz * cosT;\n        // apply Y-axis rotation (spin): rotate (nx, nz2) by -lonOffset\n        const cosL = Math.cos(-lonOffset), sinL = Math.sin(-lonOffset);\n        const nx2 = nx * cosL + nz2 * sinL;\n        const nz3 = -nx * sinL + nz2 * cosL;\n        // convert to lat/lon\n        const lat = Math.asin(-ny2);           // -PI/2..PI/2\n        const lon = Math.atan2(nx2, nz3);      // -PI..PI\n        // UV\n        let u = (lon + Math.PI) / (2 * Math.PI);\n        let v = (Math.PI/2 - lat) / Math.PI;\n        u = u - Math.floor(u);\n        const tx = Math.min(TEX_W - 1, Math.max(0, Math.floor(u * TEX_W)));\n        const ty = Math.min(TEX_H - 1, Math.max(0, Math.floor(v * TEX_H)));\n        const ti = (ty * TEX_W + tx) * 4;\n        // lighting\n        let L = nx*lx + ny*ly + nz*lz;\n        if (L < 0) L = 0;\n        const shade = 0.25 + 0.85 * L;\n        // rim fade\n        const rim = 1 - Math.pow(1 - nz, 3) * 0.5;\n        const k = shade * rim;\n        outData[idx]   = Math.min(255, td[ti]   * k);\n        outData[idx+1] = Math.min(255, td[ti+1] * k);\n        outData[idx+2] = Math.min(255, td[ti+2] * k);\n        outData[idx+3] = 255;\n      }\n    }\n    ctx.putImageData(outBuf, 0, 0);\n\n    // --- atmospheric rim glow on top ---\n    ctx.save();\n    ctx.globalCompositeOperation = 'lighter';\n    const g = ctx.createRadialGradient(cx, cy, radius * 0.85, cx, cy, radius * 1.08);\n    const rim = THEMES[currentTheme];\n    g.addColorStop(0, `rgba(${rim.land[0]},${rim.land[1]},${rim.land[2]},0)`);\n    g.addColorStop(0.7, `rgba(${rim.land[0]},${rim.land[1]},${rim.land[2]},0.35)`);\n    g.addColorStop(1, `rgba(${rim.land[0]},${rim.land[1]},${rim.land[2]},0)`);\n    ctx.fillStyle = g;\n    ctx.beginPath(); ctx.arc(cx, cy, radius * 1.08, 0, Math.PI*2); ctx.fill();\n    ctx.restore();\n  }\n\n  // ---------- User location marker (geolocation with Oran fallback) ----------\n  let USER_LAT = 35.6971 * Math.PI / 180;\n  let USER_LON = -0.6308 * Math.PI / 180;\n  const markerEl = document.getElementById('marker');\n  const markerLabel = markerEl.querySelector('.label');\n  const latReadout = document.querySelector('.meta-right .v'); // first = lat\n  const lonReadout = document.querySelectorAll('.meta-right .v')[1];\n\n  function fmtCoord(deg, pos, neg) {\n    const abs = Math.abs(deg).toFixed(4);\n    return `${abs}° ${deg >= 0 ? pos : neg}`;\n  }\n\n  async function reverseGeocode(lat, lon) {\n    try {\n      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&accept-language=fr`);\n      const j = await r.json();\n      const a = j.address || {};\n      const city = a.city || a.town || a.village || a.municipality || a.county || a.state || '';\n      const cc = (a.country_code || '').toUpperCase();\n      return (city + (cc ? ' · ' + cc : '')).trim() || 'VOUS';\n    } catch(e) { return 'VOUS'; }\n  }\n\n  function setUserLocation(latDeg, lonDeg, label) {\n    USER_LAT = latDeg * Math.PI / 180;\n    USER_LON = lonDeg * Math.PI / 180;\n    if (label) markerLabel.textContent = label.toUpperCase();\n    if (latReadout) latReadout.textContent = fmtCoord(latDeg, 'N', 'S');\n    if (lonReadout) lonReadout.textContent = fmtCoord(lonDeg, 'E', 'W');\n  }\n\n  if ('geolocation' in navigator) {\n    navigator.geolocation.getCurrentPosition(async (pos) => {\n      const { latitude, longitude } = pos.coords;\n      setUserLocation(latitude, longitude, 'Localisation…');\n      const label = await reverseGeocode(latitude, longitude);\n      markerLabel.textContent = label.toUpperCase();\n    }, () => { /* denied → keep Oran default */ }, { timeout: 8000, maximumAge: 300000 });\n  }\n\n  function updateMarker() {\n    // sphere coords (unit sphere, then tilt + spin)\n    const clat = Math.cos(USER_LAT), slat = Math.sin(USER_LAT);\n    const clon = Math.cos(USER_LON + lonOffset), slon = Math.sin(USER_LON + lonOffset);\n    // base: nx = cos(lat)*sin(lon), ny = -sin(lat), nz = cos(lat)*cos(lon)\n    let nx = clat * slon;\n    let ny = -slat;\n    let nz = clat * clon;\n    // apply axial tilt (rotation around X by +TILT)\n    const ny2 = ny * cosT - nz * sinT;\n    const nz2 = ny * sinT + nz * cosT;\n    ny = ny2; nz = nz2;\n    // project to canvas-local coords\n    const globeEl = document.getElementById('globe');\n    const W = globeEl.clientWidth, H = globeEl.clientHeight;\n    const r = W * 0.48; // match sphere radius proportion\n    const x = W/2 + nx * r;\n    const y = H/2 + ny * r;\n    markerEl.style.left = x + 'px';\n    markerEl.style.top  = y + 'px';\n    // hide when on back side\n    markerEl.style.opacity = nz > 0.02 ? 1 : 0;\n  }\n\n  // ---------- animation loop ----------\n  function loop(t) {\n    const dt = (t - lastT) / 1000;\n    lastT = t;\n    const speed = currentTheme === 'speak' ? 0.35 : currentTheme === 'listen' ? 0.14 : 0.08;\n    lonOffset += speed * dt;\n    renderSphere();\n    updateMarker();\n    requestAnimationFrame(loop);\n  }\n  requestAnimationFrame((t) => { lastT = t; loop(t); });\n\n  // ---------- build radial rays for speak state ----------\n  (function buildRays() {\n    const rays = document.getElementById('rays');\n    const N = 48;\n    for (let i = 0; i < N; i++) {\n      const r = document.createElement('div');\n      r.className = 'ray';\n      const angle = (i / N) * 360;\n      r.style.setProperty('--a', angle + 'deg');\n      r.style.setProperty('--d', ((i % 6) * 0.07) + 's');\n      rays.appendChild(r);\n    }\n  })();\n\n  // ---------- build waveform bars ----------\n  (function buildWave() {\n    const wf = document.getElementById('waveform');\n    const N = 36;\n    for (let i = 0; i < N; i++) {\n      const b = document.createElement('i');\n      // stagger + random-ish heights via delay\n      const delay = (Math.sin(i * 0.7) * 0.5 + 0.5) * 0.9;\n      b.style.animationDelay = (-delay).toFixed(2) + 's';\n      b.style.animationDuration = (0.7 + (i % 5) * 0.12).toFixed(2) + 's';\n      wf.appendChild(b);\n    }\n  })();\n\n  // ---------- state machine ----------\n  const body = document.body;\n  const captionText = document.getElementById('captionText');\n  const statusLabel = document.getElementById('statusLabel');\n  const roState = document.getElementById('roState');\n  const roFreq  = document.getElementById('roFreq');\n  const btnTalk = document.getElementById('btnTalk');\n  const btnReply = document.getElementById('btnReply');\n  const btnStop = document.getElementById('btnStop');\n\n  const STATES = {\n    idle:   { label: 'Prêt à écouter',     status: 'System · Idle',      ro: 'IDLE',      freq: '0.00 Hz'  },\n    listen: { label: \"Ibrahim écoute\",     status: 'System · Listening', ro: 'LISTENING', freq: '432.00 Hz' },\n    speak:  { label: 'Ibrahim parle',      status: 'System · Speaking',  ro: 'SPEAKING',  freq: '808.00 Hz' },\n  };\n\n  let freqInterval = null;\n\n  function setState(s) {\n    body.setAttribute('data-state', s);\n    currentTheme = s;\n    drawTexture(s);\n    const cfg = STATES[s];\n    captionText.textContent = cfg.label;\n    statusLabel.textContent = cfg.status;\n    roState.textContent = cfg.ro;\n\n    clearInterval(freqInterval);\n    if (s === 'idle') {\n      roFreq.textContent = cfg.freq;\n    } else {\n      // simulate a live frequency readout\n      freqInterval = setInterval(() => {\n        const base = s === 'listen' ? 432 : 808;\n        const jitter = (Math.random() - 0.5) * (s === 'listen' ? 18 : 46);\n        roFreq.textContent = (base + jitter).toFixed(2) + ' Hz';\n      }, 140);\n    }\n  }\n\n  btnTalk.addEventListener('click', () => setState('listen'));\n  btnReply.addEventListener('click', () => setState('speak'));\n  btnStop.addEventListener('click', () => setState('idle'));\n\n  // keyboard shortcuts\n  window.addEventListener('keydown', (e) => {\n    if (e.code === 'Space') { e.preventDefault(); setState('listen'); }\n    if (e.code === 'KeyR')  setState('speak');\n    if (e.code === 'Escape') setState('idle');\n  });\n\n  // ---------- UTC clock ----------\n  const roTime = document.getElementById('roTime');\n  function tick() {\n    const d = new Date();\n    const hh = String(d.getUTCHours()).padStart(2,'0');\n    const mm = String(d.getUTCMinutes()).padStart(2,'0');\n    const ss = String(d.getUTCSeconds()).padStart(2,'0');\n    roTime.textContent = `${hh}:${mm}:${ss}`;\n  }\n  tick(); setInterval(tick, 1000);\n\n  // start idle\n  setState('idle');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
