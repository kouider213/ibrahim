name: Deploy to Netlify

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'netlify.toml'
      - '.github/workflows/deploy-netlify.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mobile

      - name: Build
        run: npm run build
        working-directory: mobile
        env:
          VITE_BACKEND_URL: https://ibrahim-backend-production.up.railway.app
          VITE_WS_URL: wss://ibrahim-backend-production.up.railway.app
          VITE_ACCESS_TOKEN: ${{ secrets.VITE_ACCESS_TOKEN }}

      - name: Deploy to Netlify
        run: npx netlify deploy --prod --dir=mobile/dist --site=${{ secrets.NETLIFY_SITE_ID }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
