<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ibrahim — Interface vocale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f0a;
    --bg-deep: #05070a;
    --fg: #f5f7f5;
    --muted: #6a7a70;
    --idle: #6b8aa0;
    --idle-glow: rgba(107, 138, 160, 0.45);
    --listen: #006233;
    --listen-bright: #14a85a;
    --listen-glow: rgba(20, 168, 90, 0.55);
    --speak: #d21034;
    --speak-bright: #ff3355;
    --speak-glow: rgba(255, 51, 85, 0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Orbitron', sans-serif;
    user-select: none;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background:
      radial-gradient(ellipse at 50% 40%, rgba(20, 30, 25, 0.6) 0%, rgba(5, 7, 10, 1) 70%),
      var(--bg-deep);
    position: relative;
  }

  /* subtle starfield */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,0.45), transparent),
      radial-gradient(1px 1px at 35% 50%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 75% 55%, rgba(255,255,255,0.3), transparent);
    background-size: 100% 100%;
    opacity: 0.5;
  }

  .shell {
    position: relative;
    height: 100vh;
    width: 100vw;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 40px 48px;
  }

  /* ------------- HEADER ------------- */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 5;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .brand .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .brand h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 56px;
    letter-spacing: 0.18em;
    line-height: 1;
    color: var(--fg);
    text-shadow: 0 0 20px rgba(255,255,255,0.12);
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    background: rgba(255,255,255,0.02);
    backdrop-filter: blur(8px);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--idle);
    box-shadow: 0 0 10px var(--idle-glow);
    transition: all 0.5s ease;
  }

  body[data-state="listen"] .status-dot {
    background: var(--listen-bright);
    box-shadow: 0 0 14px var(--listen-glow);
  }
  body[data-state="speak"] .status-dot {
    background: var(--speak-bright);
    box-shadow: 0 0 14px var(--speak-glow);
  }

  /* ------------- STAGE ------------- */
  .stage {
    position: relative;
    display: grid;
    place-items: center;
    overflow: visible;
  }

  /* concentric guide rings */
  .guides {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    pointer-events: none;
    opacity: 0.35;
  }
  .guide-ring {
    position: absolute;
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .guide-ring:nth-child(1) { width: 720px; height: 720px; }
  .guide-ring:nth-child(2) { width: 560px; height: 560px; }
  .guide-ring:nth-child(3) { width: 900px; height: 900px; border-style: dashed; opacity: 0.5; animation: rotate-cw 120s linear infinite; }
  .guide-ring:nth-child(4) { width: 1100px; height: 1100px; border-style: dashed; opacity: 0.3; animation: rotate-ccw 180s linear infinite; }

  @keyframes rotate-cw  { to { transform: rotate(360deg); } }
  @keyframes rotate-ccw { to { transform: rotate(-360deg); } }

  /* corner tick marks */
  .ticks { position: absolute; inset: 20px; pointer-events: none; }
  .tick {
    position: absolute;
    width: 14px; height: 14px;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .tick.tl { top: 0; left: 0; border-right: none; border-bottom: none; }
  .tick.tr { top: 0; right: 0; border-left: none; border-bottom: none; }
  .tick.bl { bottom: 0; left: 0; border-right: none; border-top: none; }
  .tick.br { bottom: 0; right: 0; border-left: none; border-top: none; }

  /* ------------- GLOBE ------------- */
  .globe-wrap {
    position: relative;
    width: 420px;
    height: 420px;
    display: grid;
    place-items: center;
  }

  /* outer glow aura */
  .aura {
    position: absolute;
    width: 620px; height: 620px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--idle-glow) 0%, transparent 55%);
    opacity: 0.6;
    transition: background 0.6s ease, opacity 0.6s ease;
    filter: blur(4px);
  }
  body[data-state="listen"] .aura {
    background: radial-gradient(circle, var(--listen-glow) 0%, transparent 55%);
    animation: aura-pulse 2.4s ease-in-out infinite;
  }
  body[data-state="speak"] .aura {
    background: radial-gradient(circle, var(--speak-glow) 0%, transparent 55%);
    animation: aura-pulse 1.1s ease-in-out infinite;
  }
  @keyframes aura-pulse {
    0%, 100% { opacity: 0.55; transform: scale(1); }
    50%      { opacity: 0.95; transform: scale(1.06); }
  }

  /* sonar rings (listen) */
  .sonar {
    position: absolute;
    width: 420px; height: 420px;
    pointer-events: none;
    display: none;
  }
  body[data-state="listen"] .sonar { display: block; }
  .sonar span {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--listen-bright);
    opacity: 0;
    animation: sonar 2.8s ease-out infinite;
  }
  .sonar span:nth-child(2) { animation-delay: 0.9s; }
  .sonar span:nth-child(3) { animation-delay: 1.8s; }
  @keyframes sonar {
    0%   { transform: scale(1);   opacity: 0.7; border-width: 2px; }
    100% { transform: scale(1.9); opacity: 0;   border-width: 1px; }
  }

  /* radial speaker rays (speak) */
  .rays {
    position: absolute;
    width: 560px; height: 560px;
    display: none;
    pointer-events: none;
  }
  body[data-state="speak"] .rays { display: block; }
  .rays .ray {
    position: absolute;
    top: 50%; left: 50%;
    width: 2px;
    height: 40px;
    margin-left: -1px;
    background: linear-gradient(to top, transparent, var(--speak-bright));
    transform-origin: 50% 140px; /* pushes out from globe edge */
    transform: translate(-50%, -50%) rotate(var(--a)) translateY(-140px);
    border-radius: 2px;
    opacity: 0.9;
    animation: ray-osc 0.7s ease-in-out infinite;
    animation-delay: var(--d);
  }
  @keyframes ray-osc {
    0%, 100% { height: 16px; opacity: 0.3; }
    50%      { height: 60px; opacity: 1; }
  }

  /* the globe itself: canvas does the rendering */
  .globe {
    position: relative;
    width: 340px;
    height: 340px;
    border-radius: 50%;
    transition: box-shadow 0.6s ease;
    box-shadow:
      0 0 50px var(--idle-glow),
      0 0 120px var(--idle-glow);
    overflow: visible;
  }
  body[data-state="listen"] .globe {
    box-shadow: 0 0 60px var(--listen-glow), 0 0 160px var(--listen-glow);
  }
  body[data-state="speak"] .globe {
    box-shadow: 0 0 70px var(--speak-glow), 0 0 180px var(--speak-glow);
  }

  /* true 3D sphere rendered via canvas (ray-traced per-pixel with world texture) */
  .sphere3d {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    display: block;
    width: 100%;
    height: 100%;
  }

  /* marker anchored onto sphere in screen space — JS updates left/top */
  .marker {
    position: absolute;
    width: 14px; height: 14px;
    margin-left: -7px; margin-top: -7px;
    pointer-events: none;
    z-index: 3;
    transition: opacity 0.3s ease;
  }
  .marker .pin {
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 24px rgba(255,255,255,0.6);
  }
  .marker .pulse {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1.5px solid #fff;
    animation: markerPulse 1.8s ease-out infinite;
  }
  .marker .pulse.p2 { animation-delay: 0.6s; }
  .marker .pulse.p3 { animation-delay: 1.2s; }
  @keyframes markerPulse {
    0%   { transform: scale(1);   opacity: 0.9; }
    100% { transform: scale(3.6); opacity: 0;   }
  }
  .marker .label {
    position: absolute;
    left: 16px; top: -4px;
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.85);
    text-transform: uppercase;
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
  }
  body[data-state="listen"] .marker .pin { background: #14a85a; box-shadow: 0 0 10px rgba(20,168,90,0.9), 0 0 28px rgba(20,168,90,0.6); }
  body[data-state="listen"] .marker .pulse { border-color: #14a85a; }
  body[data-state="speak"]  .marker .pin { background: #ff3355; box-shadow: 0 0 10px rgba(255,51,85,0.9), 0 0 28px rgba(255,51,85,0.6); }
  body[data-state="speak"]  .marker .pulse { border-color: #ff3355; }

  /* globe transform container (for breathing/squash) */
  #globe {
    transition: transform 0.15s ease-out;
    will-change: transform;
  }

  .letter-I-removed {
    display: none;
  }
  /* (ancien bloc .letter-I supprimé) */
  .letter-I, body[data-state="listen"] .letter-I, body[data-state="speak"] .letter-I { display: none !important; }


  /* ------------- FOOTER ------------- */
  footer {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: end;
    gap: 40px;
    z-index: 5;
  }

  .readout {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    line-height: 1.8;
  }
  .readout .k { color: rgba(255,255,255,0.35); }
  .readout .v { color: var(--fg); }
  body[data-state="listen"] .readout .v.state-v { color: var(--listen-bright); }
  body[data-state="speak"]  .readout .v.state-v { color: var(--speak-bright); }

  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  .caption {
    font-family: 'Orbitron', sans-serif;
    font-weight: 500;
    font-size: 15px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    height: 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: color 0.5s ease;
  }
  body[data-state="listen"] .caption { color: var(--listen-bright); }
  body[data-state="speak"]  .caption { color: var(--speak-bright); }

  .caption .dot-trio { display: inline-flex; gap: 4px; }
  .caption .dot-trio i {
    width: 5px; height: 5px; border-radius: 50%;
    background: currentColor;
    opacity: 0.3;
    animation: dot-bounce 1.2s ease-in-out infinite;
  }
  .caption .dot-trio i:nth-child(2) { animation-delay: 0.15s; }
  .caption .dot-trio i:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dot-bounce {
    0%, 100% { opacity: 0.3; transform: translateY(0); }
    50%      { opacity: 1;   transform: translateY(-3px); }
  }
  body:not([data-state="listen"]):not([data-state="speak"]) .caption .dot-trio { display: none; }

  .buttons {
    display: flex;
    gap: 14px;
    align-items: center;
  }

  .btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 14px 26px;
    background: transparent;
    color: var(--fg);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 999px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(6px);
  }
  .btn:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.04); }
  .btn:active { transform: scale(0.98); }

  .btn.primary {
    border-color: var(--listen-bright);
    color: var(--listen-bright);
    box-shadow: inset 0 0 0 0 var(--listen-bright);
  }
  .btn.primary:hover {
    background: rgba(20, 168, 90, 0.12);
    box-shadow: 0 0 20px rgba(20, 168, 90, 0.25);
  }

  .btn.danger {
    border-color: rgba(255, 51, 85, 0.6);
    color: var(--speak-bright);
  }
  .btn.danger:hover {
    background: rgba(255, 51, 85, 0.1);
    box-shadow: 0 0 20px rgba(255, 51, 85, 0.2);
  }

  .btn .ico {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 10px currentColor;
  }
  .btn.danger .ico {
    border-radius: 2px;
  }

  /* live waveform (speak state) */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 48px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  body[data-state="speak"] .waveform { opacity: 1; }

  .waveform i {
    display: block;
    width: 3px;
    background: var(--speak-bright);
    border-radius: 2px;
    height: 6px;
    animation: wave 0.9s ease-in-out infinite;
    box-shadow: 0 0 6px var(--speak-glow);
  }

  @keyframes wave {
    0%, 100% { height: 6px; }
    50%      { height: 42px; }
  }

  .meta-right {
    text-align: right;
  }

  /* scanline on globe during speak */
  .scanline {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.5), transparent);
    display: none;
    pointer-events: none;
    mix-blend-mode: screen;
  }
  body[data-state="speak"] .scanline {
    display: block;
    animation: scan 2.2s linear infinite;
  }
  @keyframes scan {
    0%   { top: 10%; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: 90%; opacity: 0; }
  }

  /* small responsive adjust */
  @media (max-height: 780px) {
    .globe-wrap { width: 340px; height: 340px; }
    .globe { width: 280px; height: 280px; }
    .sonar { width: 340px; height: 340px; }
    .letter-I { font-size: 180px; }
    .brand h1 { font-size: 42px; }
  }
</style>
</head>
<body data-state="idle">

<div class="stars"></div>

<div class="shell">

  <header>
    <div class="brand">
      <span class="tag">Voice Interface · v1.0</span>
      <h1>IBRAHIM</h1>
    </div>
    <div class="status-pill">
      <span class="status-dot"></span>
      <span id="statusLabel">System · Idle</span>
    </div>
  </header>

  <section class="stage">
    <div class="ticks">
      <div class="tick tl"></div>
      <div class="tick tr"></div>
      <div class="tick bl"></div>
      <div class="tick br"></div>
    </div>

    <div class="guides">
      <div class="guide-ring"></div>
      <div class="guide-ring"></div>
      <div class="guide-ring"></div>
      <div class="guide-ring"></div>
    </div>

    <div class="globe-wrap">
      <div class="aura"></div>

      <!-- listen sonar pulses -->
      <div class="sonar">
        <span></span><span></span><span></span>
      </div>

      <!-- speak radial rays -->
      <div class="rays" id="rays"></div>

      <div class="globe" id="globe">
        <canvas class="sphere3d" id="sphere" width="680" height="680"></canvas>
        <div class="marker" id="marker">
          <span class="pulse"></span>
          <span class="pulse p2"></span>
          <span class="pulse p3"></span>
          <span class="pin"></span>
          <span class="label">ORAN · DZ</span>
        </div>
        <div class="scanline"></div>
      </div>
    </div>
  </section>

  <footer>
    <div class="readout">
      <div><span class="k">STATE ·</span> <span class="v state-v" id="roState">IDLE</span></div>
      <div><span class="k">FREQ  ·</span> <span class="v" id="roFreq">0.00 Hz</span></div>
      <div><span class="k">NODE  ·</span> <span class="v">IBR-01 · DZ</span></div>
    </div>

    <div class="controls">
      <div class="caption" id="caption">
        <span id="captionText">Prêt à écouter</span>
        <span class="dot-trio"><i></i><i></i><i></i></span>
      </div>

      <div class="waveform" id="waveform"></div>

      <div class="buttons">
        <button class="btn primary" id="btnTalk">
          <span class="ico"></span>
          <span>Parler</span>
        </button>
        <button class="btn" id="btnReply">
          <span>Répondre</span>
        </button>
        <button class="btn danger" id="btnStop">
          <span class="ico"></span>
          <span>Stop</span>
        </button>
      </div>
    </div>

    <div class="readout meta-right">
      <div><span class="k">· LAT</span> <span class="v">35.6971° N</span></div>
      <div><span class="k">· LON</span> <span class="v">0.6308° W</span></div>
      <div><span class="k">· UTC</span> <span class="v" id="roTime">--:--:--</span></div>
    </div>
  </footer>
</div>

<script>
  // ---------- world texture, built from real GeoJSON country borders ----------
  // lon -180..180 → x 0..TEX_W, lat 90..-90 → y 0..TEX_H.
  const TEX_W = 2048, TEX_H = 1024;
  const texCanvas = document.createElement('canvas');
  texCanvas.width = TEX_W; texCanvas.height = TEX_H;
  const texCtx = texCanvas.getContext('2d');

  let countriesData = null; // GeoJSON FeatureCollection
  let texImageData = null;

  function ll2xy(lon, lat) {
    return [(lon + 180) / 360 * TEX_W, (90 - lat) / 180 * TEX_H];
  }
  function traceRing(ring) {
    if (!ring || !ring.length) return;
    let [px, py] = ll2xy(ring[0][0], ring[0][1]);
    texCtx.moveTo(px, py);
    for (let i = 1; i < ring.length; i++) {
      const [nx, ny] = ll2xy(ring[i][0], ring[i][1]);
      // antimeridian safe-guard
      if (Math.abs(nx - px) > TEX_W * 0.5) texCtx.moveTo(nx, ny);
      else texCtx.lineTo(nx, ny);
      px = nx; py = ny;
    }
    texCtx.closePath();
  }
  function drawGeometry(geom) {
    if (!geom) return;
    if (geom.type === 'Polygon') {
      texCtx.beginPath();
      for (const ring of geom.coordinates) traceRing(ring);
      texCtx.fill('evenodd');
      texCtx.stroke();
    } else if (geom.type === 'MultiPolygon') {
      for (const poly of geom.coordinates) {
        texCtx.beginPath();
        for (const ring of poly) traceRing(ring);
        texCtx.fill('evenodd');
        texCtx.stroke();
      }
    }
  }

  // placeholder removed
  const _UNUSED_SVG = `

    <!-- Greenland -->
    <path class="land" d="M290,70 L320,60 L345,65 L355,85 L350,110 L335,125 L315,130 L298,120 L290,100 L285,85 Z" />
    <!-- Central America tail -->
    <path class="land" d="M225,300 L240,305 L255,320 L265,335 L275,345 L280,355 L270,360 L260,350 L248,335 L235,320 L225,310 Z" />
    <!-- Caribbean (simple blobs) -->
    <path class="land" d="M270,320 L285,318 L295,325 L285,332 L272,328 Z" />

    <!-- SOUTH AMERICA -->

  // Minimal TopoJSON → GeoJSON converter for Feature/MultiPolygon only
  function topoToGeo(topo, obj) {
    const arcs = topo.arcs;
    const transform = topo.transform;
    const sx = transform.scale[0], sy = transform.scale[1];
    const tx = transform.translate[0], ty = transform.translate[1];
    function decodeArc(i) {
      const rev = i < 0;
      const arc = arcs[rev ? ~i : i];
      let x = 0, y = 0;
      const pts = [];
      for (const p of arc) {
        x += p[0]; y += p[1];
        pts.push([x * sx + tx, y * sy + ty]);
      }
      return rev ? pts.slice().reverse() : pts;
    }
    function ringFromArcs(arcIds) {
      const out = [];
      for (let k = 0; k < arcIds.length; k++) {
        const pts = decodeArc(arcIds[k]);
        if (k > 0) pts.shift(); // avoid duplicate join point
        for (const p of pts) out.push(p);
      }
      return out;
    }
    function geomToGeo(g) {
      if (g.type === 'Polygon') {
        return { type: 'Polygon', coordinates: g.arcs.map(ringFromArcs) };
      } else if (g.type === 'MultiPolygon') {
        return { type: 'MultiPolygon', coordinates: g.arcs.map(poly => poly.map(ringFromArcs)) };
      }
      return null;
    }
    return {
      type: 'FeatureCollection',
      features: obj.geometries.map(g => ({ type: 'Feature', properties: g.properties || {}, geometry: geomToGeo(g) }))
    };
  }

  const canvas = document.getElementById('sphere');
  const ctx = canvas.getContext('2d');
  const CW = canvas.width, CH = canvas.height;
  const cx = CW / 2, cy = CH / 2;
  const radius = Math.min(CW, CH) * 0.48;
  const R2 = radius * radius;

  // tilt the globe (axial tilt) for nicer look
  const TILT = 23.5 * Math.PI / 180;
  const sinT = Math.sin(TILT), cosT = Math.cos(TILT);

  let lonOffset = 0; // rotation around Y axis
  let lastT = performance.now();

  // precompute which pixels are inside the circle (for speed)
  const outBuf = ctx.createImageData(CW, CH);
  const outData = outBuf.data;

  function renderSphere() {
    if (!texImageData) return;
    const td = texImageData.data;
    // lighting direction (from upper-left toward sphere)
    const lx = -0.55, ly = -0.45, lz = 0.70;
    for (let py = 0; py < CH; py++) {
      for (let px = 0; px < CW; px++) {
        const dx = px - cx, dy = py - cy;
        const d2 = dx*dx + dy*dy;
        const idx = (py * CW + px) * 4;
        if (d2 > R2) {
          outData[idx+3] = 0;
          continue;
        }
        // point on sphere surface (screen x,y; derive z from circle)
        const z = Math.sqrt(R2 - d2);
        // normalize to unit sphere normal
        const nx = dx / radius;
        const ny = dy / radius;
        const nz = z  / radius;
        // undo axial tilt (rotate around X axis by -TILT)
        const ny2 =  ny * cosT + nz * sinT;
        const nz2 = -ny * sinT + nz * cosT;
        // apply Y-axis rotation (spin): rotate (nx, nz2) by -lonOffset
        const cosL = Math.cos(-lonOffset), sinL = Math.sin(-lonOffset);
        const nx2 = nx * cosL + nz2 * sinL;
        const nz3 = -nx * sinL + nz2 * cosL;
        // convert to lat/lon
        const lat = Math.asin(-ny2);           // -PI/2..PI/2
        const lon = Math.atan2(nx2, nz3);      // -PI..PI
        // UV
        let u = (lon + Math.PI) / (2 * Math.PI);
        let v = (Math.PI/2 - lat) / Math.PI;
        u = u - Math.floor(u);
        const tx = Math.min(TEX_W - 1, Math.max(0, Math.floor(u * TEX_W)));
        const ty = Math.min(TEX_H - 1, Math.max(0, Math.floor(v * TEX_H)));
        const ti = (ty * TEX_W + tx) * 4;
        // lighting
        let L = nx*lx + ny*ly + nz*lz;
        if (L < 0) L = 0;
        const shade = 0.25 + 0.85 * L;
        // rim fade
        const rim = 1 - Math.pow(1 - nz, 3) * 0.5;
        const k = shade * rim;
        outData[idx]   = Math.min(255, td[ti]   * k);
        outData[idx+1] = Math.min(255, td[ti+1] * k);
        outData[idx+2] = Math.min(255, td[ti+2] * k);
        outData[idx+3] = 255;
      }
    }
    ctx.putImageData(outBuf, 0, 0);

    // --- atmospheric rim glow on top ---
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const g = ctx.createRadialGradient(cx, cy, radius * 0.85, cx, cy, radius * 1.08);
    const rim = THEMES[currentTheme];
    g.addColorStop(0, `rgba(${rim.land[0]},${rim.land[1]},${rim.land[2]},0)`);
    g.addColorStop(0.7, `rgba(${rim.land[0]},${rim.land[1]},${rim.land[2]},0.35)`);
    g.addColorStop(1, `rgba(${rim.land[0]},${rim.land[1]},${rim.land[2]},0)`);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, radius * 1.08, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

    let nx = clat * slon;
    let ny = -slat;
    let nz = clat * clon;
    // apply axial tilt (rotation around X by +TILT)
    const ny2 = ny * cosT - nz * sinT;

  let _audioCtx = null, _audioQueue = [], _audioPlaying = false, _currentSrc = null;

  function unlockAudio() {
    if (!_audioCtx) { try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch { return; } }
    if (_audioCtx.state === 'suspended') _audioCtx.resume().catch(() => {});

  async function _getCtx() {
    if (!_audioCtx || _audioCtx.state === 'closed') _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (_audioCtx.state === 'suspended') await _audioCtx.resume();
    return _audioCtx;
  }

  async function _drainQueue() {
    if (_audioPlaying || !_audioQueue.length) return;
    _audioPlaying = true;
    try {
      const ctx = await _getCtx();
      while (_audioQueue.length) {
        const buf = _audioQueue.shift();
        try {
          const decoded = await ctx.decodeAudioData(buf);
          const src = ctx.createBufferSource();
          src.buffer = decoded; src.connect(ctx.destination); _currentSrc = src;
          await new Promise(ok => { src.onended = () => { _currentSrc = null; ok(); }; src.start(); });
        } catch {}
      }
    } finally { _audioPlaying = false; setState('idle'); }
  }

  async function playBase64(b64) {
    try {
      const bin = atob(b64), bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      _audioQueue.push(bytes.buffer); void _drainQueue();
    } catch { setState('idle'); }
  }

  function iosFallback(text, done) {
    window.speechSynthesis.cancel();
    const clean = text.replace(/[\u{1F000}-\u{1FFFF}]/gu, '').replace(/\*{1,3}([^*]+)\*{1,3}/g, '$1').trim();
    const parts = clean.match(/[^.!?…:;]+[.!?…:;]*/g)?.filter(s => s.trim()) ?? [clean];
    let i = 0;
    function next() {
      if (i >= parts.length) { done?.(); return; }
      const u = new SpeechSynthesisUtterance(parts[i++].trim());
      u.lang = 'fr-FR'; u.onend = next; u.onerror = next;
      window.speechSynthesis.speak(u);
    }
    next();
  }

    try {

      micAnalyser.smoothingTimeConstant = 0.6;
      micBuf = new Uint8Array(micAnalyser.frequencyBinCount);
      src.connect(micAnalyser); micReady = true;
    } catch {}
  }

  function sampleMic() {
    if (!micReady || !micAnalyser) return 0;
    micAnalyser.getByteTimeDomainData(micBuf);
    let sum = 0;
    for (let i = 0; i < micBuf.length; i++) { const v = (micBuf[i] - 128) / 128; sum += v * v; }
    return Math.min(1, Math.sqrt(sum / micBuf.length) * 3.5);
  }

  const btnStop = document.getElementById('btnStop');

  const STATES = {
    idle:   { label: 'Prêt à écouter', status: 'System · Idle',      ro: 'IDLE',      freq: '0.00 Hz'  },
    listen: { label: 'Ibrahim écoute', status: 'System · Listening', ro: 'LISTENING', freq: '432.00 Hz' },
    speak:  { label: 'Ibrahim parle',  status: 'System · Speaking',  ro: 'SPEAKING',  freq: '808.00 Hz' },
  };

  let freqInterval = null;

  function setState(s) {
    body.setAttribute('data-state', s);
    currentTheme = s;
    drawTexture(s);
    if (s === 'listen') startMic();
    const cfg = STATES[s];
    captionText.textContent = cfg.label;
    statusLabel.textContent = cfg.status;
    roState.textContent = cfg.ro;
    clearInterval(freqInterval);
    if (s === 'idle') {
      roFreq.textContent = cfg.freq;
    } else {
      freqInterval = setInterval(() => {
        const base = s === 'listen' ? 432 : 808;
        roFreq.textContent = (base + (Math.random() - 0.5) * (s === 'listen' ? 18 : 46)).toFixed(2) + ' Hz';
      }, 140);
    }
  }

  btnTalk.addEventListener('click', () => { unlockAudio(); setState('listen'); });
  btnReply.addEventListener('click', () => { unlockAudio(); setState('speak'); });
  btnStop.addEventListener('click', () => {
    if (_recog) { try { _recog.abort(); } catch {} _recog = null; }
    if (_currentSrc) { try { _currentSrc.stop(); } catch {} }
    _audioQueue = []; _audioPlaying = false;
    window.speechSynthesis.cancel();
    setState('idle');
  });

  window.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); unlockAudio(); setState('listen'); }
    if (e.code === 'Escape') setState('idle');
  });

  // ── UTC clock ─────────────────────────────────────────────────────────────
  const roTime = document.getElementById('roTime');
  function tick() {
    const d = new Date();
    roTime.textContent = `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}:${String(d.getUTCSeconds()).padStart(2,'0')}`;
  }
  tick(); setInterval(tick, 1000);

  setState('idle');
</script>
</body>
</html>
